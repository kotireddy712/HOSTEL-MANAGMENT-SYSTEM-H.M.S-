<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Multicolor Background */
        body {
            background: linear-gradient(45deg, #ff4d4d, #ffcc00, #33cc33, #3399ff, #9933ff, #ff6600);
            background-size: 400% 400%;
            animation: bgAnimation 10s infinite alternate;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes bgAnimation {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Sliding Heading */
        .heading {
            font-size: 30px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            animation: slideIn 3s infinite alternate ease-in-out;
        }

        @keyframes slideIn {
            0% { transform: translateX(-100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .heading span:nth-child(1) { color: #ff4d4d; }  /* Red */
        .heading span:nth-child(2) { color: #ffcc00; }  /* Yellow */
        .heading span:nth-child(3) { color: #33cc33; }  /* Green */
        .heading span:nth-child(4) { color: #3399ff; }  /* Blue */
        .heading span:nth-child(5) { color: #9933ff; }  /* Purple */
        .heading span:nth-child(6) { color: #ff6600; }  /* Orange */

        /* Flexbox for Login Boxes */
        .login-container {
            display: flex;
            justify-content: space-around;
            width: 60%;
            margin-top: 20px;
        }

        /* Student & Admin Boxes */
        .box {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            width: 40%;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 20px;
        }

        /* Buttons */
        .btn {
            display: block;
            width: 200px;
            padding: 12px;
            margin: 10px auto;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            text-align: center;
            color: white;
        }

        .student-btn {
            background-color: #4CAF50;
        }

        .admin-btn {
            background-color: #f44336;
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <!-- Sliding Heading -->
    <div class="heading">
        <span>W</span><span>e</span><span>l</span><span>c</span><span>o</span><span>m</span><span>e</span>  
        <span>t</span><span>o</span>  
        <span>H</span><span>o</span><span>s</span><span>t</span><span>e</span><span>l</span><span>s</span>
    </div>

    <!-- Login Boxes -->
    <div class="login-container">
        <div class="box">
            <h2>Student Login</h2>
            <a href="{{ url_for('student_login') }}" class="btn student-btn">Login as Student</a>
        </div>

        <div class="box">
            <h2>Admin Login</h2>
            <a href="{{ url_for('admin_login') }}" class="btn admin-btn">Login as Admin</a>
        </div>
    </div>

</body>
</html>
