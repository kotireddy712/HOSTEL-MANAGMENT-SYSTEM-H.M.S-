<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; margin-top: 100px; }
        .container { width: 50%; margin: auto; }
        input, button { display: block; width: 80%; margin: 10px auto; padding: 10px; }
        button { background: #f44336; color: white; border: none; cursor: pointer; }
        button:hover { background: #d32f2f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome Admin</h1>
        <form action="{{ url_for('admin_login') }}" method="post">
            <input type="text" name="user_id" placeholder="Enter Admin ID" required>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
