<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: linear-gradient(-45deg, #ff5733, #2980b9, #27ae60, #f39c12);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .dashboard-container {
            width: 90%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-top: 20px; /* Adjusted spacing */
        }

        h2 {
            color: white;
            font-size: 30px;
            margin-bottom: 30px; /* Increased gap */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .btn {
            width: 220px;
            height: 220px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: scale(1.1);
            opacity: 0.9;
        }

        .btn-fee { background: #ff5733; }
        .btn-room { background: #2980b9; }
        .btn-maintenance { background: #27ae60; }
        .btn-leave { background: #f39c12; }

        .logout-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: #e74c3c;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

        /* 🔹 Rules Section - Separate Styling */
        .rules-section {
            margin-top: 40px; /* Increased spacing */
            text-align: center;
            padding: 15px;
        }

        .rules-section a {
            display: inline-block;
            background: #1abc9c;
            color: white;
            padding: 14px 24px;
            font-size: 18px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .rules-section a:hover {
            background: #16a085;
            transform: scale(1.07);
        }

    </style>
</head>
<body>
    <div class="dashboard-container">
        <h2>Welcome, {{ user }}!</h2>
        <button class="logout-btn" onclick="location.href='/logout'">Logout</button>
        
        <div class="container">
            <button class="btn btn-fee" onclick="location.href='/feepayment'">Pay Hostel Fee</button>
            <button class="btn btn-room" onclick="location.href='/room-allocation'">Room Allocation</button>
            <button class="btn btn-maintenance" onclick="location.href='/maintenance-request'">Maintenance Request</button>
            <button class="btn btn-leave" onclick="location.href='/apply-leave'">Apply for Leave</button>
        </div>

        <!-- Rules & Regulations Button with Improved Styling -->
        <div class="rules-section">
            <a href="{{ url_for('rules') }}">📜 Hostel Rules & Regulations</a>
        </div>
    </div>
</body>
</html>
